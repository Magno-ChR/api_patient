services:

  # ─── Base de datos PostgreSQL ─────────────────────────────────────────────
  patient-postgres:
    image: postgres:15
    container_name: patient-postgres-db
    restart: always
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient
      POSTGRES_PASSWORD: patient
    networks:
      - nutricenter_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── API Patient ──────────────────────────────────────────────────────────
  api-patient:
    image: geonmagno/api_patient:0.2.2
    container_name: patient-web-ms
    restart: unless-stopped
    ports:
      - "5003:5003"
    depends_on:
      patient-postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=patient_db;Username=patient;Password=patient;"
    networks:
      - nutricenter_net

# ─── Network compartida ─────────────────────────────────────────────────────
networks:
  nutricenter_net:
    driver: bridge

# ─── Volumen persistente ────────────────────────────────────────────────────
volumes:
  postgres_data: