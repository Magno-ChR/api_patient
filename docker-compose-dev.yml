services:

  # --- PostgreSQL - Patient Service ------------------------------------------
  patient-postgres:
    image: postgres:15
    container_name: patient-postgres-db
    restart: always
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient
      POSTGRES_PASSWORD: patient
    volumes:
      - patient_postgres_data:/var/lib/postgresql/data
    ports:
      - "5022:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patient -d patient_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - nutricenter_net

  # --- API Patient Microservice ----------------------------------------------
  api-patient:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-patient:latest
    container_name: api-patient
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://0.0.0.0:5002"
      ConnectionStrings__DefaultConnection: "Host=patient-postgres;Port=5432;Database=patient_db;Username=patient;Password=patient;"
      RabbitMQ__HostName: ${INFRA_HOST:?INFRA_HOST is required}
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: admin
      RabbitMQ__Password: admin
      RabbitMQ__VirtualHost: /
      RabbitMQ__FoodPlansExchange: meal-plans
      RabbitMQ__FoodPlansQueue: ms-patients-queue
      RabbitMQ__FoodPlanCreatedRoutingKey: meal-plan.created
      RabbitMQ__FoodPlanUpdatedRoutingKey: meal-plan.updated
      RabbitMQ__PatientsExchange: patients
      RabbitMQ__PatientCreatedRoutingKey: patient.created
      RabbitMQ__PatientUpdatedRoutingKey: patient.updated
      RabbitMQ__ReconnectDelaySeconds: "5"
      RabbitMQ__MaxReconnectAttempts: "0"
      OTEL_SERVICE_NAME: api-patient
      Telemetry__OtlpEndpoint: http://${INFRA_HOST:?INFRA_HOST is required}:4317
      Loki__Uri: http://${INFRA_HOST:?INFRA_HOST is required}:3100
      Consul__Host: http://${INFRA_HOST:?INFRA_HOST is required}:8500
      Consul__ServiceName: api-patient
      # Dirección que Consul usará para el HTTP check. Si Consul corre en otro servidor que esta API,
      # cambia "api-patient" por la IP/DNS del host donde publicas el puerto 5002 (alcanzable desde Consul).
      Consul__ServiceAddress: 167.71.109.119
      Consul__ServicePort: "5002"
    ports:
      - "5002:5002"
    depends_on:
      patient-postgres:
        condition: service_healthy
    networks:
      - nutricenter_net

  # --- Worker Patient (Outbox + RabbitMQ consumer) ---------------------------
  patient-worker:
    build:
      context: .
      dockerfile: patient.WorkerService/Dockerfile
    image: patient-worker:latest
    container_name: patient-worker
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=patient-postgres;Port=5432;Database=patient_db;Username=patient;Password=patient;"
      RabbitMQ__HostName: ${INFRA_HOST:?INFRA_HOST is required}
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: admin
      RabbitMQ__Password: admin
      RabbitMQ__VirtualHost: /
      RabbitMQ__FoodPlansExchange: meal-plans
      RabbitMQ__FoodPlansQueue: ms-patients-queue
      RabbitMQ__FoodPlanCreatedRoutingKey: meal-plan.created
      RabbitMQ__FoodPlanUpdatedRoutingKey: meal-plan.updated
      RabbitMQ__PatientsExchange: patients
      RabbitMQ__PatientCreatedRoutingKey: patient.created
      RabbitMQ__PatientUpdatedRoutingKey: patient.updated
      RabbitMQ__ReconnectDelaySeconds: "5"
      RabbitMQ__MaxReconnectAttempts: "0"
      OTEL_SERVICE_NAME: patient-worker
      Telemetry__OtlpEndpoint: http://${INFRA_HOST:?INFRA_HOST is required}:4317
      Loki__Uri: http://${INFRA_HOST:?INFRA_HOST is required}:3100
    depends_on:
      patient-postgres:
        condition: service_healthy
    networks:
      - nutricenter_net

networks:
  nutricenter_net:
    external: true
    name: develop_nutricenter_net

volumes:
  patient_postgres_data:
