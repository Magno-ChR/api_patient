global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "api-patient"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-patient:5002"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
