# Despliegue continuo por SSH (patrón similar a pruebagitflow2026/.github/workflows/docker-image.yml).
# Conexión SSH como root al servidor (username fijo abajo). Requiere Docker Engine y que la clave pública
# del secreto SSH_PRIVATE_KEY esté en /root/.ssh/authorized_keys.
#
# Secreto SSH_PRIVATE_KEY: debe ser la clave PRIVADA completa (varias líneas), por ejemplo:
#   -----BEGIN OPENSSH PRIVATE KEY-----  o  -----BEGIN RSA PRIVATE KEY-----
#   ...líneas base64...
#   -----END ... PRIVATE KEY-----
# NO pongas la línea "ssh-rsa AAAA..." (esa es la pública; va en ~/.ssh/authorized_keys del servidor).
# En GitHub → Settings → Secrets → pega el archivo tal cual (con saltos de línea). Para CI suele usarse
# una clave dedicada SIN frase de paso; si la clave tiene passphrase, añade el input `passphrase` en ambas actions.
#
# Secretos: SSH_HOST, SSH_PRIVATE_KEY. La conexión es siempre como usuario root (no se usa SSH_USER).
#
# Variables del repo (opcionales): OTEL_EXPORTER_OTLP_ENDPOINT, SEQ_SERVER_URL — si no están definidas,
# en el servidor se usan http://jaeger:4317 y http://seq:80 (misma red Docker develop_nutricenter_net).
# RabbitMQ: RABBITMQ_HOSTNAME (p. ej. rabbitmq), RABBITMQ_* deben coincidir con tu broker.

name: Deploy SSH

on:
  push:
    branches: [ "master" ]

concurrency:
  group: deploy-ssh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test --no-build -c Release --verbosity normal patient.test
          --filter "FullyQualifiedName!~IntegrationTest&FullyQualifiedName!~ContractTest"

  release:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Crear archivo de despliegue
        run: |
          git archive --format=tar.gz --output=deploy.tar.gz HEAD \
            -- . ":(exclude)patient.test"

      - name: Preparar clave SSH para scp/ssh
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::SSH_PRIVATE_KEY está vacío. Crea el secreto en el repositorio."
            exit 1
          fi
          if ! printf '%s\n' "$SSH_PRIVATE_KEY" | grep -qE '^-----BEGIN .+ PRIVATE KEY-----'; then
            echo "::error::SSH_PRIVATE_KEY no parece una clave privada PEM/OpenSSH."
            exit 1
          fi
          if ! printf '%s\n' "$SSH_PRIVATE_KEY" | grep -qE '^-----END .+ PRIVATE KEY-----'; then
            echo "::error::Falta la línea -----END ... PRIVATE KEY----- (secreto truncado al pegar)."
            exit 1
          fi
          {
            echo "DEPLOY_KEY<<EOF"
            printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r'
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Subir archivo al servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ env.DEPLOY_KEY }}
          port: 22
          source: deploy.tar.gz
          target: /tmp

      - name: Release via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          ASPNETCORE_ENVIRONMENT: ${{ vars.ASPNETCORE_ENVIRONMENT }}
          API_PATIENT_IMAGE: ${{ vars.API_PATIENT_IMAGE }}
          PATIENT_WORKER_IMAGE: ${{ vars.PATIENT_WORKER_IMAGE }}
          RABBITMQ_HOSTNAME: ${{ vars.RABBITMQ_HOSTNAME }}
          RABBITMQ_PORT: ${{ vars.RABBITMQ_PORT }}
          RABBITMQ_USERNAME: ${{ vars.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ vars.RABBITMQ_PASSWORD }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          SEQ_SERVER_URL: ${{ vars.SEQ_SERVER_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ env.DEPLOY_KEY }}
          port: 22
          envs: ASPNETCORE_ENVIRONMENT,API_PATIENT_IMAGE,PATIENT_WORKER_IMAGE,RABBITMQ_HOSTNAME,RABBITMQ_PORT,RABBITMQ_USERNAME,RABBITMQ_PASSWORD,OTEL_EXPORTER_OTLP_ENDPOINT,SEQ_SERVER_URL
          command_timeout: 20m
          script: |
            set -euo pipefail
            DEPLOY_DIR="/root/api_patient"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"
            tar xzf /tmp/deploy.tar.gz
            docker network create develop_nutricenter_net 2>/dev/null || true
            export ASPNETCORE_ENVIRONMENT="${ASPNETCORE_ENVIRONMENT:-Production}"
            export API_PATIENT_IMAGE="${API_PATIENT_IMAGE:-api-patient:dev}"
            export PATIENT_WORKER_IMAGE="${PATIENT_WORKER_IMAGE:-patient-worker:dev}"
            export RABBITMQ__HOSTNAME="${RABBITMQ_HOSTNAME:-rabbitmq}"
            export RABBITMQ__PORT="${RABBITMQ_PORT:-5672}"
            export RABBITMQ__USERNAME="${RABBITMQ_USERNAME:-admin}"
            export RABBITMQ__PASSWORD="${RABBITMQ_PASSWORD:-StrongPassword123}"
            export OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}"
            export SEQ_SERVER_URL="${SEQ_SERVER_URL:-http://seq:80}"

            docker compose -f "$DEPLOY_DIR/docker-compose-dev.yml" config >/dev/null
            docker compose -f "$DEPLOY_DIR/docker-compose-dev.yml" up -d --build --remove-orphans

      - name: Monitoreo post-release (logs y healthcheck)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ env.DEPLOY_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -uo pipefail
            echo "=== Docker status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
            echo "=== API healthcheck ==="
            health_ok=0
            for i in $(seq 1 12); do
              if curl -fsS --connect-timeout 3 "http://localhost:5002/health/live" >/dev/null; then
                health_ok=1
                break
              fi
              echo "Intento ${i}/12: API no lista todavía, reintentando en 5s..."
              sleep 5
            done
            if [ "$health_ok" -eq 1 ]; then
              echo "Healthcheck reachable on localhost:5002/health/live"
            else
              echo "::warning::Healthcheck no estable después de 12 intentos. Se muestran logs para diagnóstico."
            fi
            echo "=== API logs (tail 80) ==="
            docker compose -f "/root/api_patient/docker-compose-dev.yml" logs --tail 80 api-patient || true
            echo "=== Worker logs (tail 80) ==="
            docker compose -f "/root/api_patient/docker-compose-dev.yml" logs --tail 80 patient-worker || true
