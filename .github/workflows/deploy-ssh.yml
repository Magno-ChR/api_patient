# Despliegue por SSH en push a master.
# Secretos: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY, INFRA_HOST

name: Deploy SSH

on:
  push:
    branches: [master]

concurrency:
  group: deploy-ssh-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: >
          dotnet test --no-build -c Release --verbosity normal patient.test
          --filter "FullyQualifiedName!~IntegrationTest&FullyQualifiedName!~ContractTest"

  release:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Validar secretos
        env:
          INFRA_HOST: ${{ secrets.INFRA_HOST }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${INFRA_HOST}" ]; then
            echo "::error::El secreto INFRA_HOST es obligatorio."
            exit 1
          fi
          if [ -z "${SSH_HOST}" ]; then
            echo "::error::SSH_HOST está vacío."
            exit 1
          fi
          if [ -z "${SSH_USER}" ]; then
            echo "::error::SSH_USER está vacío."
            exit 1
          fi
          if [ -z "${SSH_PRIVATE_KEY}" ]; then
            echo "::error::SSH_PRIVATE_KEY está vacío."
            exit 1
          fi
          if ! printf '%s\n' "$SSH_PRIVATE_KEY" | grep -qE '^-----BEGIN .+ PRIVATE KEY-----'; then
            echo "::error::SSH_PRIVATE_KEY no parece una clave privada PEM/OpenSSH."
            exit 1
          fi
          if ! printf '%s\n' "$SSH_PRIVATE_KEY" | grep -qE '^-----END .+ PRIVATE KEY-----'; then
            echo "::error::Falta la línea -----END ... PRIVATE KEY-----."
            exit 1
          fi

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Crear archivo de despliegue
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output=deploy.tar.gz HEAD -- . ":(exclude)patient.test"

      - name: Configurar SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -H "$SSH_HOST" >> "$HOME/.ssh/known_hosts"
          chmod 644 "$HOME/.ssh/known_hosts"

      - name: Subir archivo al servidor
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: scp -o StrictHostKeyChecking=yes deploy.tar.gz "${SSH_USER}@${SSH_HOST}:~/deploy.tar.gz"

      - name: Release via SSH
        env:
          INFRA_HOST: ${{ secrets.INFRA_HOST }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" "export INFRA_HOST='${INFRA_HOST}'; bash -s" <<'REMOTE'
          set -euo pipefail
          DEPLOY_DIR="${HOME}/api_patient"
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          tar xzf "${HOME}/deploy.tar.gz"
          rm -f "${HOME}/deploy.tar.gz"
          docker network create develop_nutricenter_net 2>/dev/null || true
          docker compose -f "$DEPLOY_DIR/docker-compose-dev.yml" up -d --build --remove-orphans
          REMOTE

      - name: Monitoreo post-release
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" 'bash -se' <<'REMOTE'
          set -uo pipefail
          echo "=== Docker status ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo "=== API healthcheck ==="
          health_ok=0
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 3 "http://localhost:5002/health/live" >/dev/null; then
              health_ok=1
              break
            fi
            echo "Intento ${i}/12: API no lista todavía, reintentando en 5s..."
            sleep 5
          done
          if [ "$health_ok" -eq 1 ]; then
            echo "Healthcheck reachable on localhost:5002/health/live"
          else
            echo "::warning::Healthcheck no estable después de 12 intentos."
          fi
          echo "=== API logs (tail 80) ==="
          docker compose -f "${HOME}/api_patient/docker-compose-dev.yml" logs --tail 80 api-patient || true
          echo "=== Worker logs (tail 80) ==="
          docker compose -f "${HOME}/api_patient/docker-compose-dev.yml" logs --tail 80 patient-worker || true
          REMOTE
