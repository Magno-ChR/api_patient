name: CI Analysis

on:
  pull_request:
    branches: [ "master", "develop" ]
    types: [opened, synchronize, reopened, ready_for_review, review_requested]
  pull_request_review:
    types: [submitted]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Install SonarQube Cloud scanner
        run: dotnet tool install dotnet-sonarscanner --create-manifest-if-needed

      - name: Sonarcloud start
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner begin
          /k:"Magno-ChR_api_patient"
          /o:"gentec"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.cs.opencover.reportsPaths="coverage/**/coverage.opencover.xml"
          /d:sonar.coverage.exclusions="**/commitlint.config.js,**/patient.infrastructure/Migrations/**,**/api_patient/Program.cs,**/patient.WorkerService/Program.cs,**/patient.infrastructure/DependencyInyection.cs,**/patient.infrastructure/Extensions/**,**/patient.infrastructure/Integration/**,**/patient.infrastructure/Percistence/**,**/patient.infrastructure/Observability/**,**/patient.infrastructure/Security/JwtSettings.cs,**/api_patient/Controllers/**,**/api_patient/Extensions/**,**/api_patient/Middleware/**,**/api_patient/Observability/**"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: >
          dotnet test --no-build
          --verbosity normal patient.test
          --filter "FullyQualifiedName!~IntegrationTest&FullyQualifiedName!~ContractTest"
          --collect:"XPlat Code Coverage"
          --results-directory ./coverage
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover,cobertura

      - name: Sonarcloud end
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: >
          dotnet sonarscanner end
          /d:sonar.token="$SONAR_TOKEN"

      - name: Restore dotnet tools
        run: dotnet tool restore

      - name: Generate coverage report
        run: >
          dotnet tool run reportgenerator
          -reports:"./coverage/**/coverage.cobertura.xml"
          -targetdir:"./coverage/report"
          -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report
          retention-days: 7

  compose_validation:
    name: Compose validation and image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker compose syntax
        run: |
          sudo docker network create develop_nutricenter_net 2>/dev/null || true
          export INFRA_HOST=127.0.0.1
          sudo -E docker compose -f docker-compose-dev.yml config
          sudo docker compose -f docker-compose.observability.yml config

      - name: Build API and Worker images
        run: |
          export INFRA_HOST=127.0.0.1
          sudo -E docker compose -f docker-compose-dev.yml build api-patient patient-worker